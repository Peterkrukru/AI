<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>英文句子學習卡 App (SRS)</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入 PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // 設定 PDF Worker
        if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
    </script>
    <style>
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .transition-transform { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .copyright-tag { position: fixed; bottom: 10px; right: 10px; font-size: 10px; color: #9ca3af; font-weight: bold; z-index: 100; }
        /* 確保內容在小螢幕也能適配 */
        @media (max-height: 700px) {
            .card-container { height: 65vh !important; }
            #front-text { font-size: 1.25rem !important; }
            #back-en-text { font-size: 1.125rem !important; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 font-sans flex flex-col relative overflow-hidden">

    <div class="copyright-tag">@Peter Huang 2026/4/16</div>

    <header class="bg-indigo-600 text-white p-3 shadow-md text-center shrink-0">
        <h1 class="text-xl font-bold"><i class="fas fa-layer-group mr-2"></i>英文句子學習卡</h1>
    </header>

    <main class="flex-grow flex items-center justify-center p-3 relative w-full max-w-4xl mx-auto overflow-y-auto">
        
        <!-- 首頁：匯入 PDF 介面 -->
        <div id="upload-screen" class="hidden bg-white p-6 md:p-10 rounded-2xl shadow-lg text-center w-full max-w-md">
            <div class="mb-4 text-indigo-500">
                <i class="fas fa-file-pdf text-5xl"></i>
            </div>
            <h2 class="text-lg font-semibold mb-2">匯入 PDF 建立學習卡</h2>
            <p class="text-gray-500 mb-6 text-xs">請上傳包含英文句子的 PDF 檔案。</p>
            
            <!-- API KEY 輸入欄位 -->
            <div class="mb-6 text-left">
                <label for="api-key-input" class="block text-[10px] font-bold text-gray-400 mb-1 uppercase tracking-wider">Gemini API Key</label>
                <div class="relative">
                    <input type="password" id="api-key-input" placeholder="留空或貼上金鑰" 
                           class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                    <i class="fas fa-key absolute right-3 top-2.5 text-gray-300"></i>
                </div>
            </div>

            <label class="cursor-pointer bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 rounded-lg transition-colors inline-block w-full text-center shadow-md">
                <i class="fas fa-upload mr-2"></i> 選擇 PDF 檔案
                <input type="file" id="pdf-upload" accept="application/pdf" class="hidden" onchange="handleFileUpload(event)">
            </label>
        </div>

        <!-- 載入中介面 -->
        <div id="loading-screen" class="hidden flex-col items-center justify-center space-y-4">
            <i class="fas fa-circle-notch fa-spin text-5xl text-indigo-600"></i>
            <p id="loading-text" class="text-base font-medium text-gray-600">正在處理中...</p>
        </div>

        <!-- 學習卡片介面 -->
        <div id="flashcard-screen" class="hidden w-full max-w-2xl flex flex-col items-center h-full">
            
            <div class="w-full mb-3">
                <div class="flex items-center justify-between text-[10px] text-gray-500 mb-2 font-bold bg-white p-2 rounded-lg shadow-sm border border-gray-100">
                    <div class="flex items-center gap-3">
                        <button onclick="toggleInfoModal()" class="flex items-center gap-1 hover:text-indigo-600">
                            <i class="fas fa-info-circle"></i> 說明
                        </button>
                        <button onclick="clearProgressAndReload()" class="flex items-center gap-1 hover:text-indigo-600 border-l pl-3 border-gray-200">
                            <i class="fas fa-file-upload"></i> 上傳
                        </button>
                        <div id="stats-display" class="hidden sm:flex gap-2 border-l pl-3 border-gray-200">
                            <span class="text-red-500">重來:<span id="stat-again">0</span></span>
                            <span class="text-blue-500">複習:<span id="stat-review">0</span></span>
                            <span class="text-green-500">通過:<span id="stat-pass">0</span></span>
                        </div>
                    </div>
                    <div><span id="progress-text" class="bg-gray-100 px-2 py-0.5 rounded text-gray-700 font-mono">剩餘: 0/0</span></div>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-1">
                    <div id="progress-bar" class="bg-indigo-600 h-1 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <div class="w-full card-container h-[60vh] min-h-[380px] max-h-[500px] perspective-1000 cursor-pointer" onclick="flipCard()">
                <div id="card-inner" class="relative w-full h-full text-center transition-transform transform-style-3d shadow-xl rounded-2xl">
                    
                    <!-- 卡片正面 -->
                    <div class="absolute w-full h-full backface-hidden bg-white border-2 border-indigo-50 rounded-2xl flex items-center justify-center p-6">
                        <div class="flex items-start justify-center w-full">
                            <button onclick="readCurrentSentence(event)" class="text-indigo-400 hover:text-indigo-700 text-xl mr-2 mt-1 focus:outline-none shrink-0">
                                <i class="fas fa-volume-up"></i>
                            </button>
                            <h2 id="front-text" class="text-xl md:text-2xl font-bold text-gray-800 leading-tight text-left break-words"></h2>
                        </div>
                        <div class="absolute bottom-4 text-gray-300 text-[9px] font-bold uppercase tracking-widest hidden sm:block">空白鍵或點擊翻面</div>
                    </div>

                    <!-- 卡片背面 -->
                    <div class="absolute w-full h-full backface-hidden bg-indigo-50 border-2 border-indigo-100 rounded-2xl flex flex-col p-4 md:p-6 rotate-y-180 overflow-hidden text-left">
                        <div class="flex flex-col h-full">
                            <div class="flex items-start w-full mb-2">
                                <button onclick="readCurrentSentence(event)" class="text-indigo-500 hover:text-indigo-700 text-lg mr-2 mt-1 shrink-0 focus:outline-none">
                                    <i class="fas fa-volume-up"></i>
                                </button>
                                <div class="flex items-start flex-wrap flex-grow overflow-hidden">
                                    <p id="back-en-text" class="text-base md:text-lg font-semibold text-gray-700 leading-snug break-words"></p>
                                    <button id="mic-btn" onclick="toggleRecording(event)" class="text-green-500 text-2xl ml-auto mt-0 shrink-0 transition-all active:scale-90 focus:outline-none">
                                        <i class="fas fa-microphone"></i>
                                    </button>
                                </div>
                            </div>
                            
                            <hr class="border-indigo-100 mb-2">
                            <p id="back-zh-text" class="text-sm md:text-base text-gray-600 leading-tight mb-2 italic"></p>
                            
                            <!-- 評分面板 -->
                            <div id="feedback-panel" class="hidden flex flex-col bg-white/80 backdrop-blur-sm p-3 rounded-xl border border-white shadow-sm mb-3 shrink-0">
                                <div class="flex justify-between items-center mb-1">
                                    <span class="text-indigo-600 text-[9px] font-black uppercase">語音辨識評分</span>
                                    <div class="flex items-center gap-1">
                                        <span id="score-display" class="text-2xl font-black italic tracking-tighter"></span>
                                        <span class="text-gray-400 text-[10px] font-bold">/ 10</span>
                                    </div>
                                </div>
                                <div id="visual-compare" class="text-xs flex flex-wrap gap-x-1 gap-y-1 leading-tight font-mono bg-white/50 p-2 rounded-lg min-h-[40px] mb-2 overflow-y-auto max-h-[60px]"></div>
                                <div id="comment-box" class="text-[10px] font-bold py-1 px-3 rounded-full text-center"></div>
                            </div>

                            <div class="mt-auto grid grid-cols-4 gap-1.5 shrink-0">
                                <button onclick="srsAction('again', event)" class="bg-red-500 text-white py-3 rounded-xl font-bold text-[11px] shadow-sm">重來</button>
                                <button onclick="srsAction('random', event)" class="bg-orange-500 text-white py-3 rounded-xl font-bold text-[11px] shadow-sm">隨機</button>
                                <button onclick="srsAction('review', event)" class="bg-blue-500 text-white py-3 rounded-xl font-bold text-[11px] shadow-sm">複習</button>
                                <button onclick="srsAction('pass', event)" class="bg-green-600 text-white py-3 rounded-xl font-bold text-[11px] shadow-sm">通過</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 結算畫面 -->
        <div id="finish-screen" class="hidden bg-white p-8 rounded-2xl shadow-lg text-center w-full max-w-md">
            <div class="mb-4 text-green-500"><i class="fas fa-check-circle text-5xl"></i></div>
            <h2 class="text-xl font-bold mb-4">完成練習！</h2>
            <div id="final-stats" class="text-sm text-left bg-gray-50 p-4 rounded-xl mb-6 space-y-1"></div>
            <button onclick="restartSession()" class="bg-indigo-600 text-white font-medium py-3 px-6 rounded-lg w-full">重新開始</button>
        </div>

        <!-- 說明彈窗 -->
        <div id="info-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onclick="toggleInfoModal()">
            <div class="bg-white rounded-2xl p-6 max-w-xs w-full shadow-2xl" onclick="event.stopPropagation()">
                <h3 class="text-base font-bold mb-4 border-b pb-2">操作說明</h3>
                <ul class="space-y-3 text-xs">
                    <li><span class="bg-gray-100 px-1.5 py-0.5 rounded font-mono font-bold mr-1">Space</span> 點擊卡片可翻轉</li>
                    <li><span class="bg-red-100 text-red-600 px-1.5 py-0.5 rounded font-mono font-bold mr-1">1</span> 重來 (Again)</li>
                    <li><span class="bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded font-mono font-bold mr-1">2</span> 隨機 (Random)</li>
                    <li><span class="bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded font-mono font-bold mr-1">3</span> 複習 (Review)</li>
                    <li><span class="bg-green-100 text-green-600 px-1.5 py-0.5 rounded font-mono font-bold mr-1">4</span> 通過 (Pass)</li>
                </ul>
                <button onclick="toggleInfoModal()" class="mt-6 w-full py-2 bg-indigo-50 text-indigo-700 rounded-lg font-bold text-sm">關閉</button>
            </div>
        </div>
    </main>

    <script>
        let originalCards = [], queue = [], totalInitial = 0, isFlipped = false, stats = { again: 0, random: 0, review: 0, pass: 0 };
        const API_KEY_STORAGE_KEY = 'gemini_api_key_v1';
        const PROGRESS_STORAGE_KEY = 'ai_flashcard_progress_v1';
        let currentApiKey = localStorage.getItem(API_KEY_STORAGE_KEY) || ""; 

        const ui = {
            upload: document.getElementById('upload-screen'),
            loading: document.getElementById('loading-screen'),
            flashcard: document.getElementById('flashcard-screen'),
            finish: document.getElementById('finish-screen'),
            infoModal: document.getElementById('info-modal'),
            loadingText: document.getElementById('loading-text'),
            apiKeyInput: document.getElementById('api-key-input'),
            showLoading: (msg) => {
                [ui.upload, ui.flashcard, ui.finish, ui.loading].forEach(s => s.classList.add('hidden'));
                ui.loading.classList.remove('hidden'); 
                ui.loading.classList.add('flex');
                if(msg) ui.loadingText.textContent = msg;
            },
            showFlashcards: () => {
                ui.loading.classList.add('hidden'); 
                ui.loading.classList.remove('flex');
                ui.flashcard.classList.remove('hidden'); 
                renderCard();
            },
            showFinish: () => {
                ui.flashcard.classList.add('hidden'); 
                ui.finish.classList.remove('hidden');
                document.getElementById('final-stats').innerHTML = `
                    <div class="flex justify-between"><span>重來:</span> <b>${stats.again}</b></div>
                    <div class="flex justify-between"><span>隨機:</span> <b>${stats.random}</b></div>
                    <div class="flex justify-between"><span>複習:</span> <b>${stats.review}</b></div>
                    <div class="flex justify-between text-green-600"><span>通過:</span> <b>${stats.pass}</b></div>
                `;
                saveProgress();
            },
            showError: (msg) => { 
                console.error(msg);
                alert(msg); 
                ui.loading.classList.add('hidden'); 
                ui.loading.classList.remove('flex'); 
                ui.upload.classList.remove('hidden'); 
            }
        };

        function saveProgress() { 
            localStorage.setItem(PROGRESS_STORAGE_KEY, JSON.stringify({ originalCards, queue, totalInitial, stats, timestamp: Date.now() })); 
        }

        function loadProgress() {
            const saved = localStorage.getItem(PROGRESS_STORAGE_KEY);
            if (!saved) return false;
            try {
                const data = JSON.parse(saved);
                if (data.originalCards?.length) {
                    originalCards = data.originalCards; 
                    queue = data.queue; 
                    totalInitial = data.totalInitial; 
                    stats = data.stats || { again: 0, random: 0, review: 0, pass: 0 };
                    queue.length > 0 ? ui.showFlashcards() : ui.showFinish();
                    return true;
                }
            } catch (e) { localStorage.removeItem(PROGRESS_STORAGE_KEY); }
            return false;
        }

        window.onload = () => { 
            if (ui.apiKeyInput) ui.apiKeyInput.value = currentApiKey;
            if (!loadProgress()) ui.upload.classList.remove('hidden'); 
        };
        
        function toggleInfoModal() { ui.infoModal.classList.toggle('hidden'); }
        function clearProgressAndReload() { localStorage.removeItem(PROGRESS_STORAGE_KEY); location.reload(); }

        async function handleFileUpload(event) {
            currentApiKey = ui.apiKeyInput.value.trim();
            localStorage.setItem(API_KEY_STORAGE_KEY, currentApiKey);
            const file = event.target.files[0];
            if (!file || file.type !== "application/pdf") return;
            ui.showLoading("解析 PDF 中...");
            try {
                const arrayBuffer = await file.arrayBuffer();
                const sentences = await extractSentencesFromPDF(arrayBuffer);
                if (!sentences?.length) throw new Error("提取不到英文句子。");
                const target = sentences.slice(0, 30);
                ui.showLoading("翻譯生成卡片中...");
                const translations = await translateSentences(target);
                originalCards = target.map((en, i) => ({ en, zh: translations[i] || "翻譯失敗" }));
                startSession(originalCards);
            } catch (error) { ui.showError(error.message); }
        }

        async function extractSentencesFromPDF(buf) {
            const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
            let fullText = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                fullText += (await page.getTextContent()).items.map(item => item.str).join(" ") + " ";
            }
            return fullText.split(/(?<=[.?!])\s+/).map(s => s.trim()).filter(s => s.length > 10 && /[a-zA-Z]/.test(s));
        }

        async function translateSentences(sentences) {
            const modelId = currentApiKey ? "gemini-2.5-flash" : "gemini-2.5-flash-preview-09-2025";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelId}:generateContent?key=${currentApiKey}`;
            const payload = {
                contents: [{ parts: [{ text: `Translate to Traditional Chinese (zh-TW), return JSON string array: ${JSON.stringify(sentences)}` }] }],
                generationConfig: { temperature: 0.1, responseMimeType: "application/json" }
            };
            const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            const data = await res.json();
            return JSON.parse(data.candidates?.[0]?.content?.parts?.[0]?.text || "[]");
        }

        function startSession(cards) { 
            queue = [...cards]; 
            totalInitial = queue.length; 
            stats = { again: 0, random: 0, review: 0, pass: 0 }; 
            saveProgress(); 
            ui.showFlashcards(); 
        }

        function restartSession() { startSession(originalCards); }

        function renderCard() {
            if (!queue?.length) { ui.showFinish(); return; }
            const cur = queue[0];
            document.getElementById('front-text').textContent = cur.en;
            document.getElementById('back-en-text').textContent = cur.en;
            document.getElementById('back-zh-text').textContent = cur.zh;
            document.getElementById('feedback-panel').classList.add('hidden');
            document.getElementById('progress-text').textContent = `剩餘: ${queue.length}/${totalInitial}`;
            document.getElementById('stat-again').textContent = stats.again;
            document.getElementById('stat-review').textContent = stats.review;
            document.getElementById('stat-pass').textContent = stats.pass;
            document.getElementById('progress-bar').style.width = `${((totalInitial - queue.length) / totalInitial) * 100}%`;
            isFlipped = false; 
            updateCardFlipStyle(); 
            speak(cur.en);
        }

        function updateCardFlipStyle() { 
            const inner = document.getElementById('card-inner'); 
            if (inner) isFlipped ? inner.classList.add('rotate-y-180') : inner.classList.remove('rotate-y-180'); 
        }

        function flipCard() { 
            isFlipped = !isFlipped; 
            document.getElementById('feedback-panel').classList.add('hidden');
            updateCardFlipStyle(); 
        }

        function srsAction(type, event) {
            if (event) event.stopPropagation();
            if (!queue.length) return;
            const current = queue.shift(); 
            stats[type]++;
            if (type === 'again') queue.splice(1, 0, current);
            else if (type === 'random') queue.splice(Math.floor(queue.length / 2), 0, current);
            else if (type === 'review') queue.push(current);
            saveProgress();
            renderCard();
        }

        function speak(text) { 
            window.speechSynthesis.cancel(); 
            const u = new SpeechSynthesisUtterance(text); 
            u.lang = 'en-US'; u.rate = 0.9; 
            window.speechSynthesis.speak(u); 
        }

        function readCurrentSentence(event) { if(event) event.stopPropagation(); if (queue.length) speak(queue[0].en); }

        document.addEventListener('keydown', (e) => {
            if (!ui.flashcard.offsetParent) return;
            if (e.key === ' ') { e.preventDefault(); flipCard(); }
            else if (isFlipped) {
                if (e.key === '1') srsAction('again'); 
                else if (e.key === '2') srsAction('random');
                else if (e.key === '3') srsAction('review'); 
                else if (e.key === '4') srsAction('pass');
            }
        });

        const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null, isRecording = false;
        if (SpeechRec) {
            recognition = new SpeechRec(); 
            recognition.lang = 'en-US'; 
            recognition.onstart = () => { isRecording = true; document.getElementById('mic-btn').classList.add('text-red-500', 'animate-pulse'); };
            recognition.onresult = (e) => { setTimeout(() => handleScore(e.results[0][0].transcript), 1500); };
            recognition.onend = () => { isRecording = false; document.getElementById('mic-btn').classList.remove('text-red-500', 'animate-pulse'); };
        }

        function toggleRecording(event) { 
            if(event) event.stopPropagation(); 
            if(!recognition) return; 
            isRecording ? recognition.stop() : (document.getElementById('feedback-panel').classList.add('hidden'), recognition.start()); 
        }

        function getStringDistance(a, b) {
            const m = Array.from({length:a.length+1},()=>Array(b.length+1).fill(0));
            for(let i=0;i<=a.length;i++) m[i][0]=i; for(let j=0;j<=b.length;j++) m[0][j]=j;
            for(let i=1;i<=a.length;i++) for(let j=1;j<=b.length;j++) m[i][j]=Math.min(m[i-1][j]+1, m[i][j-1]+1, m[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
            return m[a.length][b.length];
        }

        function handleScore(transcript) {
            if (!queue.length) return;
            const originalWordsRaw = queue[0].en.replace(/[^\w\s]/g,"").split(/\s+/).filter(x => x.length > 0);
            const userWords = transcript.toLowerCase().replace(/[^\w\s]/g,"").split(/\s+/).filter(x => x.length > 0);
            let totalDeduction = 0, hasMajorError = false;

            const visualHTML = originalWordsRaw.map((word, idx) => {
                const wordLower = word.toLowerCase(), userWord = userWords[idx] || "";
                if (wordLower === userWord) return `<span class="text-green-600">${word}</span>`;
                const dist = getStringDistance(wordLower, userWord), ratio = dist / Math.max(wordLower.length, 1);
                if (userWord && ratio <= 0.3) totalDeduction += 0.5; else { totalDeduction += 1; hasMajorError = true; }
                return `<span class="text-red-500 underline decoration-dotted underline-offset-2">${word}</span>`;
            }).join(' ');

            const finalScore = Math.max(0, Math.round(10 - (totalDeduction / originalWordsRaw.length) * 10));
            const sDisplay = document.getElementById('score-display');
            sDisplay.textContent = finalScore;
            sDisplay.className = `text-2xl font-black italic ${finalScore >= 9 ? 'text-green-600' : finalScore >= 6 ? 'text-orange-500' : 'text-red-600'}`;
            document.getElementById('visual-compare').innerHTML = visualHTML;

            const cBox = document.getElementById('comment-box');
            cBox.textContent = finalScore === 10 ? "🌟 非常清晰！" : hasMajorError ? "❌ 請再試一次" : "💡 有點小瑕疵";
            cBox.className = `text-[10px] font-bold py-1 px-3 rounded-full ${finalScore >= 9 ? 'bg-green-100 text-green-700' : 'bg-orange-100 text-orange-700'}`;
            document.getElementById('feedback-panel').classList.remove('hidden');
        }
    </script>
</body>
</html>
